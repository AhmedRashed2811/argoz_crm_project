{% load static %}
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Argoz CRM</title><link rel="stylesheet" href="{% static 'css/crm.css' %}"></head>
<body><div style="min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f2a43,#2f80ed);padding:20px"><div class="card" style="width:min(460px,100%)"><div class="brand" style="color:#182335"><div class="brand-mark">A</div><div><div class="brand-title">Argoz CRM</div><div class="brand-sub" style="color:#697386">Secure SaaS login</div></div></div><form method="post">{% csrf_token %}<div class="field"><label>Email</label>{{ form.username }}</div><div class="field" style="margin-top:12px"><label>Password</label>{{ form.password }}</div><button class="btn btn-primary" style="width:100%;margin-top:18px">Login</button></form><p class="small muted">Default seed user: admin@argoz.local / Admin@12345</p></div></div></body></html>
